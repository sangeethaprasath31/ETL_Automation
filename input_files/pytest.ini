; [pytest]
;
; minversion = 8.0
;
; testpaths =
;     tests
;
; python_files =
;     test_*.py
;
; python_classes =
;     Test*
;
; python_functions =
;     test_*
;
; addopts =
;     -v
;     -s
;     --tb=short
;     --html=reports/report.html
;     --self-contained-html
;
; markers =
;     smoke: Smoke Tests
;     regression: Regression Tests
;     sanity: Sanity Tests
;     etl: ETL Validation Tests
;
; filterwarnings =
;     ignore::DeprecationWarning
;
; log_cli = true
;
; log_cli_level = INFO
;
; log_format =
;     %(asctime)s %(levelname)s %(message)s
;
; log_date_format =
;     %Y-%m-%d %H:%M:%S
;
; norecursedirs =
;     .git
;     venv
;     build